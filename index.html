<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>聖母號計畫中心 - WTFairytales</title>
    <style>
        /* =========================================
           《極限返航》高階 RWD 版本
           設計：一頁式佈局、動態星空、電影海報元素
           ========================================= */

        :root {
            --primary-gold: #e2b13c;
            --terminal-blue: #2c5d63;
            --text-light: #c4d1d9;
            --bg-dark: #05070a;
            --glass-bg: rgba(5, 7, 10, 0.85);
        }

        * { box-sizing: border-box; }

        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: var(--bg-dark);
            /* 加入充滿星星的太空背景圖片 */
            background-image: url('https://images.unsplash.com/photo-1475275083424-b4ff81625b60?ixlib=rb-1.2.1&auto=format&fit=crop&w=1950&q=80');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            font-family: 'PingFang TC', 'Microsoft JhengHei', sans-serif;
            color: var(--text-light);
            overflow: hidden; /* 電腦版保持一頁呈現 */
        }

        /* 響應式容器：電腦版一頁式 */
        .main-wrapper {
            display: flex;
            justify-content: center;
            align-items: center;
            width: 100%;
            height: 100vh;
            padding: 20px;
            backdrop-filter: blur(3px); /* 背景輕微模糊提升質感 */
        }

        .terminal-container {
            display: flex;
            flex-direction: row; /* 左右佈局：海報與文字 */
            width: 95%;
            max-width: 1100px;
            height: 85vh;
            background: var(--glass-bg);
            border: 1px solid var(--terminal-blue);
            box-shadow: 0 0 50px rgba(0,0,0,0.8);
            position: relative;
            overflow: hidden;
        }

        /* 左側：電影海報區 */
        .poster-side {
            flex: 1;
            background: #000;
            position: relative;
            display: flex;
            justify-content: center;
            align-items: center;
            border-right: 1px solid var(--terminal-blue);
        }

        .poster-side img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            opacity: 0.7;
            transition: 0.5s;
        }

        .poster-side:hover img { opacity: 0.9; }

        .poster-overlay {
            position: absolute;
            bottom: 20px;
            text-align: center;
            width: 100%;
            background: rgba(0,0,0,0.6);
            padding: 10px 0;
        }

        /* 右側：終端機文字區 */
        .content-side {
            flex: 1.5;
            display: flex;
            flex-direction: column;
            padding: 30px;
            overflow-y: auto;
        }

        .terminal-header {
            color: var(--terminal-blue);
            font-size: 0.8rem;
            margin-bottom: 20px;
            border-bottom: 1px dotted var(--terminal-blue);
            padding-bottom: 5px;
        }

        .subject-name {
            color: var(--primary-gold);
            font-size: 2.5rem;
            margin: 10px 0;
            letter-spacing: 5px;
            text-shadow: 0 0 10px rgba(226, 177, 60, 0.5);
        }

        .log-box {
            flex: 1;
            font-size: 0.9rem;
            line-height: 1.6;
            margin: 20px 0;
        }

        .log-entry { margin-bottom: 15px; }
        .log-text-alien { color: #b388ff; }

        /* 按鈕區域 */
        .button-group {
            display: flex;
            gap: 15px;
            margin-top: 20px;
            flex-wrap: wrap;
        }

        .nav-button {
            flex: 1;
            min-width: 180px;
            padding: 12px;
            text-align: center;
            color: var(--primary-gold);
            border: 1px solid var(--primary-gold);
            text-decoration: none;
            background: rgba(226, 177, 60, 0.05);
            font-weight: bold;
            transition: 0.3s;
            text-transform: uppercase;
        }

        .nav-button:hover {
            background: var(--primary-gold);
            color: var(--bg-dark);
            box-shadow: 0 0 15px var(--primary-gold);
        }

        /* RWD 響應式調整 */
        @media (max-width: 768px) {
            body, html { overflow: auto; } /* 手機版允許捲動 */
            .main-wrapper { height: auto; padding: 10px; }
            .terminal-container {
                flex-direction: column;
                height: auto;
            }
            .poster-side { height: 300px; }
            .subject-name { font-size: 1.8rem; }
            .button-group { flex-direction: column; }
        }

        .cursor {
            display: inline-block;
            width: 8px;
            height: 1rem;
            background: var(--primary-gold);
            animation: blink 1s infinite;
        }
        @keyframes blink { 50% { opacity: 0; } }
    </style>
</head>
<body>

    <div class="main-wrapper">
        <div class="terminal-container">
            
            <div class="poster-side">
                <img src="https://images.unsplash.com/photo-1614728894747-a83421e2b9c9?ixlib=rb-1.2.1&auto=format&fit=crop&w=1000&q=80" alt="Mission Poster">
                <div class="poster-overlay">
                    <small>MISSION ID: PROJECT HAIL MARY</small>
                </div>
            </div>

            <div class="content-side">
                <div class="terminal-header">
                    [系統狀態：在線] [使用者：WTFairytales] [地點：波江座]
                </div>
                
                <h1 class="subject-name">WTFairytales</h1>
                
                <div class="log-box">
                    <div class="log-entry">
                        <span style="color:var(--terminal-blue)">> STATUS:</span> 正在同步星圖數據。發現不明物體。
                    </div>
                    <div class="log-entry">
                        <span style="color:var(--terminal-blue)">> RECORD:</span> 科學是唯一的共通點。我和洛基（Rocky）已經完成了交叉驗證。
                    </div>
                    <div class="log-entry log-text-alien">
                        「你觀察，我工作。我們拯救兩家，WTFairytales。」
                    </div>
                    <div class="log-entry" style="border-top: 1px solid #222; padding-top: 10px; font-style: italic;">
                        警告：噬星者感染率已達 12%。請儘速執行搜尋與防禦程序。
                    </div>
                </div>

                <div class="button-group">
                    <a href="website search.html" class="nav-button">
                        搜尋程序 (SEARCH)
                    </a>
                    <a href="Chicken_v1.html" class="nav-button">
                        雛雞計畫 (CHICKEN V1)
                    </a>
                </div>

                <p style="margin-top: 20px; font-size: 0.8rem; opacity: 0.6;">
                    > AWAITING COMMAND<span class="cursor"></span>
                </p>
            </div>

        </div>
    </div>

</body>
</html>
